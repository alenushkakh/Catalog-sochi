#app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: var(--bg); }

.card { background: var(--surface); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }

.client-mini .cm-next { color: var(--accent); font-size: 10px; white-space: nowrap; }
.card-mini { background: var(--surface); border-radius: 8px; padding: 8px 12px; font-size: 12px; margin-bottom: 4px; }
.filter-panel {

.fp-lbl { font-size: 11px; color: var(--text-muted); width: 75px; flex-shrink: 0; }
.fp-input {

.fp-input:focus { outline: 1.5px solid var(--accent); }
.fp-reset {

  border: 0; padding: 6px; font-size: 12px; cursor: pointer;
  text-align: right; align-self: flex-end;
}
.photo-del {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,.65); color: #fff; border: 0;

.photo-add {

.prop-img { position: relative; }

.bottom-nav {

.fab {

.modal-bg {

.modal {

.field { margin-bottom: 12px; }

.btn.danger { background: transparent; color: var(--danger); }

.cal-head { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }

  .filter-panel { max-width: 760px; }
  .client-mini { font-size: 13px; padding: 8px 14px; min-height: 40px; }

@keyframes rb-in { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@media (max-width: 600px) {
  .reminder-banner { left: 12px; right: 12px; top: max(env(safe-area-inset-top), 12px); max-width: none; }

@media (min-width: 900px) {
  .client-mini .cm-name { font-size: 14px; }
  .modal-bg { align-items: center; }
  .modal { border-radius: 18px; max-width: 560px; max-height: 88vh; }
}

function id() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  // RFC4122 v4 fallback
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
function dateISO(daysOffset = 0, hour = null, minute = 0) {
  const d = new Date();
  d.setDate(d.getDate() + daysOffset);
  if (hour !== null) d.setHours(hour, minute, 0, 0);
  return d.toISOString();
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.clients) {
      // миграции: добавляем недостающие поля для старых данных
      if (!s.agents) s.agents = ['Алёна', 'М. Колесников', 'Е. Сидорова'];
      if (!s.deals) s.deals = [];
      if (s.user && s.user.onlyMine === undefined) s.user.onlyMine = (s.user.role === 'Агент');
      if (s.agents) s.agents = [...new Set(s.agents.filter(Boolean))];
      s.partnerDeals = [];
      if (!s.tgChats) s.tgChats = []; // [{id, title, chatId}]
      if (!s.broadcasts) s.broadcasts = []; // [{id, propertyId, chatId, when, status, sentAt}]
      // конвертируем не-UUID ID в UUID (для совместимости с Supabase)
      const isUuid = x => typeof x === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(x);
      ['clients','properties','tasks','deals','partnerDeals','referrals'].forEach(k => {
        (s[k]||[]).forEach(r => { if (r && !isUuid(r.id)) r.id = id(); });
      });
      s.clients.forEach(c => {
        if (c.responsible === undefined) c.responsible = s.user?.name || 'Алёна';
        if (c.nextAction === undefined) c.nextAction = '';
        if (c.requestComment === undefined) c.requestComment = '';
        if (c.priority === undefined) c.priority = false;
        if (c.clientType && (c.status === 'new' || !c.status)) c.status = c.clientType;
        delete c.clientType;
        // если budgetMln нет, но есть текстовый — парсим
        if ((c.budgetMln == null || c.budgetMln === '') && c.budget) {
          const m = String(c.budget).match(/(\d+)/);
          if (m) c.budgetMln = +m[1];
        }
        delete c.budget;
      });
      s.properties.forEach(p => {
        if (p.complex === undefined) p.complex = p.title || '';
        if (p.kind === 'sec') p.kind = 'flat';
        if (p.kind === 'th') p.kind = 'house';
        if (p.commission === undefined) p.commission = '';
        if (p.bedrooms === undefined) p.bedrooms = parseBedrooms(p.rooms);
        if (p.reno === undefined) p.reno = '';
        if (p.photos === undefined) p.photos = p.photo ? [p.photo] : [];
        if (p.agent === undefined) p.agent = '';
        if (p.agentPhone === undefined) p.agentPhone = '';
        if (p.nextEvent === undefined) p.nextEvent = null;
        if (p.nextEventTitle === undefined) p.nextEventTitle = '';
        if (p.ownerPhone === undefined) p.ownerPhone = '';
        if (p.ownerName === undefined) p.ownerName = '';
        delete p.photo;
        delete p.rooms;
      });
      if (!s.agentPhones) s.agentPhones = {};
      saveState(s);
      return s;
    }
  } catch(e) {}
  const s = defaultState();
  saveState(s);
  return s;
}

  return n + ' ₽';
};
const fmtDate = (iso) => {

const fmtDateTime = (iso) => {

         ' · ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

const fmtTime = (iso) => {

    ? { id: ae.id, name: ae.name, type: ae.type, start: ae.selectionStart, end: ae.selectionEnd }

  // восстанавливаем фокус и курсор

      try { if (focusInfo.start != null) el.setSelectionRange(focusInfo.start, focusInfo.end); } catch(e) {}

  }
}

function viewProperties() {
  const q = (propSearch||'').toLowerCase().trim();
  const f = propFilters;
  let list = state.properties.filter(p => p.kind === propTab);

  // search
  if (q) list = list.filter(p =>
    (p.title||'').toLowerCase().includes(q) || (p.complex||'').toLowerCase().includes(q) ||
    (p.district||'').toLowerCase().includes(q) || (p.developer||'').toLowerCase().includes(q)
  );
  // фильтры
  if (f.priceMin) list = list.filter(p => (p.price||0) >= f.priceMin);
  if (f.priceMax) list = list.filter(p => (p.price||0) <= f.priceMax);
  if (f.district) list = list.filter(p => p.district === f.district);
  if (f.bedrooms !== '') list = list.filter(p => {
    const b = p.bedrooms != null ? p.bedrooms : parseBedrooms(p.rooms);
    return f.bedrooms === '5+' ? b >= 5 : b === +f.bedrooms;
  });
  if (f.reno === 'yes') list = list.filter(p => p.reno && p.reno !== 'no');
  else if (f.reno === 'no') list = list.filter(p => !p.reno || p.reno === 'no');

  // sort
  if (propSort === 'price-asc') list.sort((a,b) => (a.price||0) - (b.price||0));
  else if (propSort === 'price-desc') list.sort((a,b) => (b.price||0) - (a.price||0));
  else if (propSort === 'name') list.sort((a,b) => (a.complex||'').localeCompare(b.complex||''));

  const sortLabel = { 'price-asc':'Цена ↑', 'price-desc':'Цена ↓', 'name':'По ЖК' }[propSort];
  const districts = [...new Set(state.properties.map(p => p.district).filter(Boolean))].sort();
  const activeFilterCount = (f.priceMin?1:0) + (f.priceMax?1:0) + (f.district?1:0) + (f.bedrooms!==''?1:0) + (f.reno?1:0);

  let body = '';
  if (!list.length) {
    body = `<div class="empty"><div class="ico">▦</div><p>Ничего не найдено</p></div>`;
  } else if (propView === 'group') {
    const groups = {};
    list.forEach(p => { const k = p.complex || '— Без ЖК'; (groups[k] = groups[k] || []).push(p); });
    body = Object.keys(groups).sort().map(complex => {
      const items = groups[complex];
      const minPrice = Math.min(...items.map(i => i.price||0));
      return `
        <div class="section-h" style="display:flex; justify-content: space-between; align-items: center;">
          <span>${complex} · ${items.length}</span>
          <span style="color:var(--accent); text-transform:none; letter-spacing:0;">от ${fmtMoneyShort(minPrice)}</span>
        </div>
        ${items.map(p => propRowCard(p)).join('')}
      `;
    }).join('');
  } else if (propView === 'table') {
    body = `<div class="tbl-wrap"><table class="crm">
      <thead><tr><th>ЖК</th><th>№</th><th>Спал.</th><th>Площадь</th><th>Ремонт</th><th>Район</th><th>Цена</th></tr></thead>
      <tbody>
        ${list.map(p => `
          <tr onclick="openProperty('${p.id}')" style="cursor:pointer;">
            <td><span style="font-weight:500;">${p.complex||'—'}</span></td>
            <td>${p.title||''}</td>
            <td>${propBedroomsText(p)}</td>
            <td>${p.area||''}</td>
            <td>${p.reno?({cosmetic:'Косм.',euro:'Евро',design:'Дизайн.'})[p.reno]:'—'}</td>
            <td>${p.district||''}</td>
            <td style="color:var(--accent); font-weight:600;">${fmtMoneyShort(p.price)}</td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
  } else {
    body = `<div class="gallery">${list.map(p => propGridCard(p)).join('')}</div>`;
  }

  return `
    <div class="tabs">
      <button class="tab ${propTab==='new'?'active':''}" onclick="setPropTab('new')">Новостройки</button>
      <button class="tab ${propTab==='flat'?'active':''}" onclick="setPropTab('flat')">Квартиры</button>
      <button class="tab ${propTab==='house'?'active':''}" onclick="setPropTab('house')">Дома</button>
    </div>
    <input id="pr-search" class="search" placeholder="Поиск ЖК, района, застройщика…" value="${propSearch}" oninput="propSearch=this.value; render()" autocomplete="off" />
    <div style="display:flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;">
      <button class="tab ${propFiltersOpen||activeFilterCount?'active':''}" onclick="propFiltersOpen=!propFiltersOpen; render()">
        Фильтры${activeFilterCount?` · ${activeFilterCount}`:''}
      </button>
      <button class="tab" onclick="cyclePropSort()">Сорт.: ${sortLabel}</button>
    </div>
    <div style="display:flex; gap: 4px; margin-bottom: 12px;">
      <button class="tab ${propView==='grid'?'active':''}" onclick="propView='grid'; render()">▦ Плитки</button>
      <button class="tab ${propView==='group'?'active':''}" onclick="propView='group'; render()">≡ По ЖК</button>
      <button class="tab ${propView==='table'?'active':''}" onclick="propView='table'; render()">⊞ Таблица</button>
    </div>

    ${propFiltersOpen ? `
    <div class="filter-panel">
      <div class="fp-row">
        <span class="fp-lbl">Цена, млн</span>
        <input class="fp-input" type="number" placeholder="от" value="${f.priceMin?f.priceMin/1000000:''}" onchange="propFilters.priceMin = this.value ? +this.value*1000000 : null; render()">
        <input class="fp-input" type="number" placeholder="до" value="${f.priceMax?f.priceMax/1000000:''}" onchange="propFilters.priceMax = this.value ? +this.value*1000000 : null; render()">
      </div>
      <div class="fp-row">
        <span class="fp-lbl">Тип</span>
        <select class="fp-input" onchange="propFilters.bedrooms = this.value; render()">
          <option value="" ${f.bedrooms===''?'selected':''}>Любой</option>
          <option value="0" ${f.bedrooms==='0'?'selected':''}>Студия</option>
          <option value="1" ${f.bedrooms==='1'?'selected':''}>1-комн</option>
          <option value="2" ${f.bedrooms==='2'?'selected':''}>2-комн</option>
          <option value="3" ${f.bedrooms==='3'?'selected':''}>3-комн</option>
          <option value="4" ${f.bedrooms==='4'?'selected':''}>4-комн</option>
          <option value="5+" ${f.bedrooms==='5+'?'selected':''}>5+</option>
        </select>
      </div>
      <div class="fp-row">
        <span class="fp-lbl">Район</span>
        <select class="fp-input" onchange="propFilters.district = this.value; render()">
          <option value="">— любой —</option>
          ${districts.map(d => `<option value="${d}" ${f.district===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="fp-row">
        <span class="fp-lbl">Ремонт</span>
        <select class="fp-input" onchange="propFilters.reno = this.value; render()">
          <option value="" ${f.reno===''?'selected':''}>Не важно</option>
          <option value="yes" ${f.reno==='yes'?'selected':''}>С ремонтом</option>
          <option value="no" ${f.reno==='no'?'selected':''}>Без ремонта</option>
        </select>
      </div>
      <button class="fp-reset" onclick="resetFilters()">Сбросить</button>
    </div>` : ''}

    <p class="meta" style="margin: 8px 0 12px;">Найдено: ${list.length}</p>
    ${body}
  `;
}
function resetFilters() {
  propFilters = { priceMin: null, priceMax: null, district: '', bedrooms: '', reno: '' };
  render();
}
function propMainPhoto(p) { return (p.photos && p.photos[0]) || ''; }
function propBedroomsText(p) { return p.bedrooms != null ? bedroomsLabel(p.bedrooms) : ''; }
function propGridCard(p) {

    <div class="prop-card" onclick="openProperty('${p.id}')">

function setPropTab(t) { propTab = t; render(); }
function cyclePropSort() {
  const order = ['price-asc','price-desc','name'];

  render();
}

function viewClients() {
  const f = clientFilters;
  const q = (clientSearch||'').toLowerCase().trim();
  let list = visibleClients().slice();
  if (q) list = list.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.phone||'').includes(q) ||
    (c.requestComment||'').toLowerCase().includes(q)
  );
  if (f.status) list = list.filter(c => c.status === f.status);
  if (f.budgetMin) list = list.filter(c => (c.budgetMln||0) >= f.budgetMin);
  if (f.budgetMax) list = list.filter(c => (c.budgetMln||999) <= f.budgetMax);
  if (f.nextRange) {
    const now = new Date(); now.setHours(0,0,0,0);
    const endOfDay = new Date(now); endOfDay.setHours(23,59,59,999);
    const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate()+7);
    list = list.filter(c => {
      if (!c.nextContact) return f.nextRange === 'none';
      const d = new Date(c.nextContact);
      if (f.nextRange === 'overdue') return d < now;
      if (f.nextRange === 'today') return d >= now && d <= endOfDay;
      if (f.nextRange === 'week') return d >= now && d <= weekEnd;
      if (f.nextRange === 'has') return true;
      return true;
    });
  }
  const activeFilters = (f.status?1:0) + (f.budgetMin?1:0) + (f.budgetMax?1:0) + (f.nextRange?1:0);

  return `
    <input id="cl-search" class="search" placeholder="Поиск клиента, телефона, запроса…" value="${clientSearch}" oninput="clientSearch=this.value; render()" autocomplete="off" />
    <div style="display:flex; gap:6px; margin-bottom: 10px; flex-wrap: wrap;">
      <button class="tab ${clientFiltersOpen||activeFilters?'active':''}" onclick="clientFiltersOpen=!clientFiltersOpen; render()">Фильтры${activeFilters?` · ${activeFilters}`:''}</button>
    </div>
    ${clientFiltersOpen ? `
      <div class="filter-panel">
        <div class="fp-row">
          <span class="fp-lbl">Статус</span>
          <select class="fp-input" onchange="clientFilters.status = this.value; render()">
            <option value="">Все</option>
            ${STATUSES.filter(s=>s!=='archive').map(s =>
              `<option value="${s}" ${f.status===s?'selected':''}>${statusLabel(s)}</option>`
            ).join('')}
          </select>
        </div>
        <div class="fp-row">
          <span class="fp-lbl">Бюджет, млн</span>
          <input class="fp-input" type="number" placeholder="от" value="${f.budgetMin||''}" onchange="clientFilters.budgetMin = this.value ? +this.value : null; render()">
          <input class="fp-input" type="number" placeholder="до" value="${f.budgetMax||''}" onchange="clientFilters.budgetMax = this.value ? +this.value : null; render()">
        </div>
        <div class="fp-row">
          <span class="fp-lbl">Контакт</span>
          <select class="fp-input" onchange="clientFilters.nextRange = this.value; render()">
            <option value="">Все</option>
            <option value="overdue" ${f.nextRange==='overdue'?'selected':''}>Просрочен</option>
            <option value="today" ${f.nextRange==='today'?'selected':''}>Сегодня</option>
            <option value="week" ${f.nextRange==='week'?'selected':''}>Неделя</option>
            <option value="has" ${f.nextRange==='has'?'selected':''}>Назначен</option>
            <option value="none" ${f.nextRange==='none'?'selected':''}>Не назначен</option>
          </select>
        </div>
        <button class="fp-reset" onclick="resetClientFilters()">Сбросить</button>
      </div>
    ` : ''}
    <p class="meta" style="margin: 6px 0 10px;">Найдено: ${list.length}</p>
    <div class="tbl-wrap">
      <table class="crm">${renderClientRows(list)}</table>
    </div>
  `;
}
function resetClientFilters() {
  clientFilters = { status: '', budgetMin: null, budgetMax: null, nextRange: '' };
  render();
}
function renderClientRows(list) {
  return `
    <thead><tr>
      <th>Клиент</th><th>Статус</th><th>Запрос</th><th>Бюджет</th><th>Тел.</th><th>Ответственный</th><th>Контакт</th><th>Действие</th>
    </tr></thead>
    <tbody>
      ${list.length === 0 ? `<tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding:30px;">Нет клиентов</td></tr>` :
        list.map(c => `
          <tr onclick="openClient('${c.id}')" style="cursor:pointer; border-left: 3px solid ${statusStripe(c.status)}; ${c.priority?'background: rgba(250,199,117,.12);':''}">
            <td><span class="avatar" style="width:24px; height:24px; font-size:10px; display:inline-flex; vertical-align:middle; margin-right:6px;">${initials(c.name)}</span>${c.priority?'⭐ ':''}${c.name}</td>
            <td><span class="pill ${statusClass(c.status)}">${statusLabel(c.status)}</span></td>
            <td style="max-width: 200px; white-space: normal; font-size: 11px; color: var(--text-muted);">${(c.requestComment||'').slice(0,80)}</td>
            <td>${budgetText(c)}</td>
            <td>${c.phone||''}</td>
            <td>${c.responsible||''}</td>
            <td>${c.nextContact ? fmtDateTime(c.nextContact) : '—'}</td>
            <td>${c.nextAction ? `<span style="color:var(--accent);">${c.nextAction}</span>` : ''}</td>

function crmDealsBody() {
  const list = state.deals.slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
  const totals = list.reduce((acc, d) => {
    const itog = (d.commission||0) - (d.expenses||0);
    const left = itog - (d.received||0);
    acc.commission += d.commission||0;
    acc.expenses += d.expenses||0;
    acc.itog += itog;
    acc.received += d.received||0;
    acc.left += left;
    return acc;
  }, { commission:0, expenses:0, itog:0, received:0, left:0 });

  return `
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Комиссии всего</div><div class="value">${fmtMoneyShort(totals.commission)}</div></div>
      <div class="kpi"><div class="label">Получено</div><div class="value" style="color:var(--success);">${fmtMoneyShort(totals.received)}</div></div>
      <div class="kpi"><div class="label">Расходы</div><div class="value">${fmtMoneyShort(totals.expenses)}</div></div>
      <div class="kpi"><div class="label">Осталось</div><div class="value" style="color:var(--accent);">${fmtMoneyShort(totals.left)}</div></div>
    </div>

    ${!list.length ? `<div class="empty"><div class="ico">⚐</div><p>Сделок ещё нет</p></div>` :
    `<div class="tbl-wrap">
      <table class="crm">

function crmCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7;
  const monthName = calDate.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
  const today = new Date();

  let cells = [];
  for (let i=0; i<startWeekday; i++) {
    const d = new Date(y, m, -startWeekday+i+1);
    cells.push({ d, muted: true });
  }
  for (let i=1; i<=lastDay.getDate(); i++) cells.push({ d: new Date(y, m, i), muted: false });
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length-1].d;
    cells.push({ d: new Date(last.getFullYear(), last.getMonth(), last.getDate()+1), muted: true });
  }

  const allEvents = () => {
    const list = state.tasks.map(t => ({ when: t.when, title: t.title, kind: 'task', id: t.id }));
    visibleClients().forEach(c => {
      if (c.nextContact) list.push({
        when: c.nextContact,
        title: (c.nextAction || 'Контакт') + ' · ' + c.name,
        kind: 'client', id: c.id
      });
    });
    const u = state.user;
    state.properties.forEach(p => {
      if (!p.nextEvent) return;
      // агент видит события по своим объектам, директор — по всем
      const visible = u.role !== 'Агент' || p.agent === u.name;
      if (!visible) return;
      list.push({
        when: p.nextEvent,
        title: (p.nextEventTitle || 'Событие') + ' · ' + (p.complex || p.title),
        kind: 'property', id: p.id
      });
    });
    return list;
  };
  const eventsForDay = (d) => allEvents().filter(e => isSameDay(new Date(e.when), d));
  const sel = selectedDay ? new Date(selectedDay) : today;
  const dayTasks = eventsForDay(sel).sort((a,b)=>new Date(a.when)-new Date(b.when));

  return `
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <button class="icon-btn" onclick="calMove(-1)">‹</button>
      <div style="font-weight:500; text-transform: capitalize;">${monthName}</div>
      <button class="icon-btn" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-head">${['пн','вт','ср','чт','пт','сб','вс'].map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-grid">
      ${cells.map(c => {
        const isToday = isSameDay(c.d, today);
        const isSelected = selectedDay && isSameDay(c.d, new Date(selectedDay));
        const hasEv = eventsForDay(c.d).length > 0;
        return `<div class="cal-day ${c.muted?'muted':''} ${isToday?'today':''} ${isSelected&&!isToday?'selected':''} ${hasEv?'has-event':''}" onclick="selectDay('${c.d.toISOString()}')">${c.d.getDate()}</div>`;
      }).join('')}
    </div>
    <div class="section-h">${sel.toLocaleDateString('ru-RU', {day:'numeric', month:'long'})} · ${dayTasks.length} событий</div>
    ${dayTasks.length === 0 ? `<div class="empty"><p>Событий нет</p></div>` :
      dayTasks.map(t => `
        <div class="card" onclick="${t.kind==='task'?`openTask('${t.id}')`:t.kind==='client'?`openClient('${t.id}')`:`openProperty('${t.id}')`}" style="border-left: 3px solid ${t.kind==='client'?'var(--accent)':t.kind==='property'?'var(--success)':'var(--info)'};">
          <div class="card-row">
            <div>
              <h3>${t.title}</h3>
              <p class="meta">${fmtTime(t.when)} · ${t.kind==='task'?'Задача':t.kind==='client'?'Клиент':'Объект'}</p>
            </div>
          </div>
        </div>`).join('')}
  `;
}
function calMove(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  render();
}
function selectDay(iso) { selectedDay = iso; render(); }

function crmTasks() {
  const all = state.tasks.slice().sort((a,b) => new Date(a.when) - new Date(b.when));
  let list = all;
  if (taskFilter === 'today') list = all.filter(t => isSameDay(new Date(t.when), new Date()));
  else if (taskFilter === 'week') {
    const wkEnd = new Date(); wkEnd.setDate(wkEnd.getDate()+7);
    list = all.filter(t => new Date(t.when) <= wkEnd);
  }
  const overdue = list.filter(t => !t.done && isOverdue(t.when));
  const today = list.filter(t => !t.done && !isOverdue(t.when) && isSameDay(new Date(t.when), new Date()));
  const upcoming = list.filter(t => !t.done && !isOverdue(t.when) && !isSameDay(new Date(t.when), new Date()));
  const done = list.filter(t => t.done);

  const renderGroup = (title, arr, hClass) => arr.length ? `
    <div class="section-h" ${hClass||''}>${title}</div>
    ${arr.map(t => `
      <div class="list-item">
        <div class="check ${t.done?'done':''}" onclick="event.stopPropagation(); toggleTask('${t.id}')">${t.done?'✓':''}</div>
        <div style="flex:1; cursor:pointer;" onclick="openTask('${t.id}')">
          <div class="task-text ${t.done?'done':''}" style="font-size: 14px;">${t.title}</div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">${fmtDateTime(t.when)}</div>
        </div>
      </div>`).join('')}
  ` : '';

  return `
    <div style="display:flex; gap:6px; overflow-x:auto; margin-bottom: 8px;">
      <button class="tab ${taskFilter==='all'?'active':''}" onclick="setTaskFilter('all')">Все</button>
      <button class="tab ${taskFilter==='today'?'active':''}" onclick="setTaskFilter('today')">Сегодня</button>
      <button class="tab ${taskFilter==='week'?'active':''}" onclick="setTaskFilter('week')">Неделя</button>
    </div>
    ${list.length === 0 ? `<div class="empty"><div class="ico">✓</div><p>Задач нет</p></div>` : ''}
    ${renderGroup('Просрочено', overdue, 'style="color:var(--danger);"')}
    ${renderGroup('Сегодня', today)}
    ${renderGroup('Предстоящие', upcoming)}
    ${renderGroup('Выполнено', done)}
  `;
}
function setTaskFilter(f) { taskFilter = f; render(); }
function toggleTask(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (t) { t.done = !t.done; saveState(state); queuePush('task', t); render(); }
}

async function deleteMyAccount() {
  if (!supa || !currentAgentRow) {
    alert('Сначала войдите в облако');
    return;
  }
  const confirm1 = prompt('Удаление аккаунта необратимо. Будут удалены: все клиенты, задачи, сделки, рассылки, реферальный баланс.\n\nЕсли уверены — введите слово "УДАЛИТЬ" заглавными буквами:');
  if (confirm1 !== 'УДАЛИТЬ') return;
  try {
    const { data, error } = await supa.rpc('delete_my_data');
    if (error) { alert('Ошибка: ' + error.message); return; }
    // выходим
    await supa.auth.signOut();
    clearLocalUserState();
    localStorage.removeItem('lastAuthUserId');
    state.user.cloudConnected = false;
    state.user.avatar = null;
    state.user.email = '';
    saveState(state);
    currentAgentRow = null;
    alert('Все ваши данные удалены. Если хотите окончательно удалить email — напишите на info@каталог-сочи.рф, мы удалим его из системы авторизации в течение 24 часов.');
    render();
  } catch (e) {
    alert('Ошибка удаления: ' + e.message);
  }
}

function transferClient(cid) {
  const c = state.clients.find(x => x.id === cid);
  if (!c) return;
  const agents = [...new Set((state.agents || []).filter(Boolean).filter(a => a !== c.responsible))];
  if (!agents.length) {
    alert('В системе нет других агентов. Добавьте сотрудника через Профиль → + Сотрудник.');
    return;
  }
  openModal(`
    <h2>Передать клиента</h2>
    <p class="meta" style="margin-bottom: 14px;">Клиент: <strong style="color:var(--text);">${c.name}</strong></p>

    ${agents.map(a => `

        <div class="card-row">
          <div>
            <h3>${a}</h3>
            <p class="meta">${state.clients.filter(x => x.responsible === a).length} клиентов</p>
          </div>
          <span style="color:var(--accent); font-size: 18px;">↗</span>
        </div>
      </div>
    `).join('')}
    <button class="btn ghost" style="margin-top: 10px;" onclick="openClient('${cid}')">Отмена</button>
  `);
}
async function doTransferClient(cid, newAgent) {
  const c = state.clients.find(x => x.id === cid);
  if (!c) return;
  const oldAgent = c.responsible;
  if (!confirm(`Передать «${c.name}» от ${oldAgent} к ${newAgent}? Клиент пропадёт из вашего списка и появится у ${newAgent}.`)) return;

  // если есть облако — обновляем через Supabase напрямую (правильный путь)
  if (supa && currentAgentRow) {
    try {
      const { data: ag, error: aerr } = await supa.from('agents').select('id').eq('name', newAgent).limit(1).maybeSingle();
      if (aerr) { alert('Ошибка поиска агента: ' + aerr.message); return; }
      if (!ag) { alert('Агент «'+newAgent+'» не найден в облаке. Сначала он должен войти в приложение хотя бы раз.'); return; }

      const { error: uerr } = await supa.from('clients')
        .update({ responsible_agent_id: ag.id, responsible_name: newAgent })
        .eq('id', cid);
      if (uerr) { alert('Ошибка передачи: ' + uerr.message); return; }

      // у себя локально удаляем — теперь это не наш клиент
      state.clients = state.clients.filter(x => x.id !== cid);
      saveState(state); closeModal(); render();
      alert('Передан агенту ' + newAgent + '.');
    } catch (e) { alert('Сбой: ' + e.message); }
    return;
  }

  // офлайн-режим (без облака): просто меняем responsible
  c.responsible = newAgent;
  saveState(state); queuePush('client', c); closeModal(); render();
  alert('Передан агенту ' + newAgent + '. После входа в облако он увидит клиента.');
}
function updClient(cid, field, val) {
  const c = state.clients.find(x => x.id === cid);
  if (!c) return;
  c[field] = val;
  saveState(state); queuePush('client', c);
  if (['name','status','phone','type','budget','budgetMln','nextContact','nextAction','responsible'].includes(field)) render();
}
function delClient(cid) {
  if (!confirm('Удалить клиента?')) return;
  state.clients = state.clients.filter(c => c.id !== cid);
  saveState(state); syncDelete('client', cid); closeModal(); render();
}

async function uploadOnePhotoToStorage(blob, propId) {
  if (!supa || !currentAgentRow) return null;
  try {
    const filename = `${propId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;
    const { error } = await supa.storage.from('property-photos').upload(filename, blob, {
      contentType: 'image/jpeg', cacheControl: '3600', upsert: false,
    });
    if (error) { console.warn('storage upload:', error); return null; }
    const { data } = supa.storage.from('property-photos').getPublicUrl(filename);
    return data?.publicUrl || null;
  } catch(e) { console.warn(e); return null; }
}

function uploadPropPhotos(pid, input) {
  const p = state.properties.find(x => x.id === pid);
  if (!p) return;
  if (!Array.isArray(p.photos)) p.photos = [];
  const files = Array.from(input.files || []);
  const slotsLeft = 5 - p.photos.length;
  if (slotsLeft <= 0) { alert('Максимум 5 фото'); return; }
  const filesToProcess = files.slice(0, slotsLeft);
  let processed = 0;
  filesToProcess.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = async () => {
        const max = 1000;
        const ratio = Math.min(max / img.width, max / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        let quality = 0.78;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > 380000 && quality > 0.35) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
        const storageUrl = await uploadOnePhotoToStorage(blob, pid);
        try {
          p.photos.push(storageUrl || dataUrl);
          saveState(state);
          if (storageUrl) queuePush('property', p);
          processed++; checkDone();
        } catch (err) {
          alert('Не хватает места локально — фото сохранено в облаке');
          processed++; checkDone();
        }
      };
      img.onerror = () => { alert('Не удалось прочитать фото'); processed++; checkDone(); };
      img.src = e.target.result;
    };
    reader.onerror = () => { processed++; checkDone(); };
    reader.readAsDataURL(file);
  });
  function checkDone() {
    if (processed === filesToProcess.length) openProperty(pid);
  }
}

function delPropPhoto(pid, idx) {

async function shareProperty(pid) {
  const p = state.properties.find(x => x.id === pid);
  if (!p) return;
  const text = `${p.complex || ''} · ${p.title || ''}\n${propBedroomsText(p)} · ${p.area||''} · ${p.district||''}\nЦена: ${fmtMoney(p.price)}\n${p.note||''}\n\nКонтакт агента: ${state.user.name} ${state.user.phone||''}`;
  // если есть фото — попробуем поделиться файлом (Telegram/WhatsApp принимают)
  const photo = p.photos && p.photos[0];
  if (photo && navigator.canShare) {
    try {
      const resp = await fetch(photo);
      const blob = await resp.blob();
      const file = new File([blob], (p.complex||'object')+'.jpg', { type: 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ title: p.complex || p.title, text, files: [file] });
        return;
      }
    } catch(e) {}
  }
  if (navigator.share) {
    try { await navigator.share({ title: p.complex || p.title, text }); return; } catch(e) {}
  }
  navigator.clipboard?.writeText(text).then(()=>alert('Текст скопирован — вставьте в мессенджер'));
}

async function uploadAvatar(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = e => resolve(e.target.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = reject;
      i.src = dataUrl;
    });
    // обрезаем по центру в квадрат и уменьшаем до 240x240
    const size = Math.min(img.width, img.height);
    const sx = (img.width - size) / 2;
    const sy = (img.height - size) / 2;
    const canvas = document.createElement('canvas');
    canvas.width = 240; canvas.height = 240;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, sx, sy, size, size, 0, 0, 240, 240);
    const compressed = canvas.toDataURL('image/jpeg', 0.85);
    state.user.avatar = compressed;
    // обновляем превью в модалке
    const preview = document.getElementById('up-avatar-img');
    if (preview) {
      if (preview.tagName === 'IMG') preview.src = compressed;
      else preview.outerHTML = `<img id="up-avatar-img" src="${compressed}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
    }
    // пушим в облако если подключено
    if (supa && currentAgentRow) {
      supa.from('agents').update({ avatar_url: compressed }).eq('id', currentAgentRow.id)
        .then(({ error }) => { if (error) console.warn('avatar push:', error); });
    }
    saveState(state);
  } catch(e) {
    console.error('uploadAvatar:', e);
    alert('Не удалось загрузить фото');
  }
}
function removeAvatar() {
  state.user.avatar = null;
  if (supa && currentAgentRow) {

async function dedupeData() {
  // Находим дубли по содержимому (имя+телефон у клиентов, ЖК+цена у объектов и т.п.)
  function dedupeBy(list, keyFn) {
    const seen = new Map(); // key -> { keep, dropIds: [] }
    list.forEach(item => {
      const k = keyFn(item);
      if (!k) return;
      const ts = item.updatedAt || item.created_at || 0;
      const prev = seen.get(k);
      if (!prev) seen.set(k, { keep: item, dropIds: [] });
      else {
        const prevTs = prev.keep.updatedAt || prev.keep.created_at || 0;
        if (ts > prevTs) {
          prev.dropIds.push(prev.keep.id);
          prev.keep = item;
        } else {
          prev.dropIds.push(item.id);
        }
      }
    });
    const dropIds = new Set();
    seen.forEach(v => v.dropIds.forEach(id => dropIds.add(id)));
    return { kept: list.filter(x => !dropIds.has(x.id)), dropped: [...dropIds] };
  }
  const cli = dedupeBy(state.clients, c => `${(c.name||'').toLowerCase().trim()}|${(c.phone||'').replace(/\D/g,'')}`);
  const props = dedupeBy(state.properties, p => `${(p.complex||'').toLowerCase().trim()}|${(p.title||'').toLowerCase().trim()}|${p.price||''}`);
  const dl = dedupeBy(state.deals, d => `${(d.object||'').toLowerCase().trim()}|${(d.client||'').toLowerCase().trim()}|${d.date||''}`);
  const total = cli.dropped.length + props.dropped.length + dl.dropped.length;
  if (total === 0) { alert('Дубликатов не найдено'); return; }
  if (!confirm(`Найдено дубликатов:\n• Клиенты: ${cli.dropped.length}\n• Объекты: ${props.dropped.length}\n• Сделки: ${dl.dropped.length}\n\nУдалить?`)) return;
  // помечаем tombstone'ом и физически удаляем
  cli.dropped.forEach(id => syncDelete('client', id));
  props.dropped.forEach(id => syncDelete('property', id));
  dl.dropped.forEach(id => syncDelete('deal', id));
  state.clients = cli.kept;
  state.properties = props.kept;
  state.deals = dl.kept;
  saveState(state);
  render();
  alert(`Удалено ${total} дублей`);
}

function parseCsv(text) {
  // убираем BOM
  text = text.replace(/^﻿/, '');
  const rows = [];
  let cur = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else cell += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ';' || ch === ',' || ch === '\t') { cur.push(cell); cell = ''; }
      else if (ch === '\n') { cur.push(cell); rows.push(cur); cur = []; cell = ''; }
      else if (ch === '\r') { /* skip */ }
      else cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); rows.push(cur); }
  return rows;
}
function pickFile(accept) {
  return new Promise(resolve => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = accept;
    inp.onchange = e => { const f = e.target.files[0]; if (f) f.text().then(resolve); };
    inp.click();
  });
}

  if (!confirm('Восстановление перезапишет текущие данные. Продолжить?')) return;
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (!data.clients || !data.properties) throw new Error('Не похоже на бэкап');
        state = data;
        saveState(state);
        alert('Восстановлено');
        render();
      } catch (err) { alert('Ошибка: ' + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function downloadXls(filename, rows) {
  // BOM для корректной кодировки в Excel
  const csv = '﻿' + rows.map(r => r.map(cell => {
    const s = (cell == null ? '' : String(cell)).replace(/"/g, '""');
    return /[";\n,]/.test(s) ? `"${s}"` : s;
  }).join(';')).join('\n');
  const blob = new Blob([csv], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename + '-' + new Date().toISOString().slice(0,10) + '.xls';
  a.click();
  URL.revokeObjectURL(url);
}

async function sendBroadcastNow(bid) {
  if (!supa) { alert('Нужен вход в облако'); return; }
  const b = state.broadcasts.find(x => x.id === bid);
  if (!b) return;
  // ставим время в прошлое — крон Supabase подхватит в течение минуты
  b.when = new Date(Date.now() - 60000).toISOString();
  b.status = 'pending';
  saveState(state);
  const { error } = await supa.from('tg_broadcasts')
    .update({ when_at: b.when, status: 'pending', error_text: null })
    .eq('id', bid);
  if (error) { alert('Ошибка: ' + error.message); return; }
  closeModal();
  alert('Поставлено в очередь. Бот отправит в течение минуты. Откройте «Расписание» позже чтобы увидеть статус «sent».');
  // через 70 секунд автоматически синхронизируем
  setTimeout(async () => { await syncPullAll(); render(); }, 70000);
}

  openModal(`
    <h2>Переименовать агента</h2>

    <div class="field"><label>Телефон (опционально)</label><input id="rn-phone" value="${state.agentPhones?.[oldName]||''}" type="tel"></div>
    <button class="btn" onclick="doRenameAgent('${oldName.replace(/'/g,"\\'")}')">Сохранить</button>
    <button class="btn ghost" style="margin-top:8px;" onclick="switchAgent()">Отмена</button>
  `);
}
function doRenameAgent(oldName) {
  const newName = (document.getElementById('rn-input').value || '').trim();
  const phone = (document.getElementById('rn-phone').value || '').trim();
  if (!newName) { alert('Имя не может быть пустым'); return; }
  if (!state.agentPhones) state.agentPhones = {};

  if (newName !== oldName) {
    if ((state.agents||[]).includes(newName)) {
      alert('Агент с таким именем уже есть. Выберите другое имя.');
      return;
    }
    state.clients.forEach(c => { if (c.responsible === oldName) c.responsible = newName; });
    state.properties.forEach(p => { if (p.agent === oldName) p.agent = newName; });
    state.agents = (state.agents||[]).map(a => a === oldName ? newName : a);
    if (state.user.name === oldName) state.user.name = newName;
    // перенести телефон
    if (state.agentPhones[oldName]) {
      state.agentPhones[newName] = state.agentPhones[oldName];
      delete state.agentPhones[oldName];
    }
  }
  if (phone) state.agentPhones[newName] = phone;
  // если переименовали текущего — обновим phone у user
  if (state.user.name === newName && phone) state.user.phone = phone;

  saveState(state);
  switchAgent();
}
function fireAgent(name) {

/* ============================== SUPABASE: AUTH ============================== */
// Замок — пока не подтверждена сессия Supabase, прячем все данные приложения
let authChecked = false; // true когда мы хотя бы раз спросили Supabase про сессию
function shouldLockUI() {
  // Заблокировать UI если: устройство хоть раз было подключено к облаку, но сейчас нет активной сессии
  // Это защищает от показа кеша на чужом устройстве и при сменe юзера
  if (!state.user.cloudConnected) return false; // никогда не подключались — это offline режим
  if (!authChecked) return true; // ещё не проверили — пока скрываем
  return !currentAgentRow; // подключались раньше, но сейчас нет сессии — заблокировать
}

function initSupabase() {
  if (!window.supabase) { console.warn('Supabase JS не загружен'); authChecked = true; render(); return; }
  try {
    supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    supa.auth.getSession().then(({ data }) => {
      if (data?.session?.user) {
        onAuthLogin(data.session.user);
      } else {
        authChecked = true;
        render();
      }
    });
    supa.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session?.user) onAuthLogin(session.user);
      if (event === 'SIGNED_OUT') {
        currentAgentRow = null;
        syncStatus = 'offline';
        clearLocalUserState();
        clearTombstones();
        state.user.cloudConnected = false;
        state.user.avatar = null;
        state.user.email = '';
        saveState(state);
        authChecked = true;
        render();
      }
    });
  } catch (e) { console.error('initSupabase:', e); authChecked = true; render(); }
}

async function onAuthLogin(authUser) {
  syncStatus = 'syncing'; renderTopbar();
  try {
    // ВАЖНО: если пользователь сменился — чистим локальный state чтобы данные предыдущего не «прилипли»
    const lastAuthId = localStorage.getItem('lastAuthUserId');
    if (lastAuthId && lastAuthId !== authUser.id) {
      clearLocalUserState();
    }
    localStorage.setItem('lastAuthUserId', authUser.id);

    let { data: agent, error } = await supa.from('agents').select('*').eq('auth_user_id', authUser.id).maybeSingle();
    if (error) console.error('agents fetch:', error);
    let isNewAgent = false;
    if (!agent) {
      // первый вход — создаём профиль агента
      isNewAgent = true;
      const meta = authUser.user_metadata || {};
      const pendingRef = (localStorage.getItem('pendingRefCode') || '').trim().toUpperCase() || null;
      const ins = await supa.from('agents').insert({
        auth_user_id: authUser.id,
        name: meta.name || state.user.name || authUser.email.split('@')[0],
        role: 'Агент', // безопасность: при первом входе всегда Агент. Повышает Директор через UI
        city: state.user.city || 'Сочи',
        phone: meta.phone || '',
        referred_by_code: pendingRef,
        consent_at: meta.consent_at || new Date().toISOString(),
        consent_version: meta.consent_version || '2026-06-14',
      }).select().maybeSingle();
      agent = ins.data;
      if (ins.error) { alert('Ошибка создания профиля агента: ' + ins.error.message); return; }

      // если был реф-код — начисляем месяц пригласившему
      if (pendingRef) {
        try {
          const { data: cr } = await supa.rpc('credit_referrer', { inviter_code: pendingRef });
          if (cr && cr.ok) {
            localStorage.removeItem('pendingRefCode');
            console.log('Реферал засчитан, новый срок подписки пригласившего:', cr.new_subscription_end);
          }
        } catch(e) { console.warn('credit_referrer:', e); }
      }
    }
    currentAgentRow = agent;
    state.user.name = agent.name;
    state.user.role = agent.role;
    state.user.phone = agent.phone || state.user.phone;
    state.user.email = authUser.email;
    state.user.cloudConnected = true;
    state.user.refCode = agent.ref_code || state.user.refCode;
    state.user.subscriptionEnd = agent.subscription_end || state.user.subscriptionEnd;
    // подтягиваем аватар с сервера если он там есть
    if (agent.avatar_url) state.user.avatar = agent.avatar_url;
    saveState(state);
    await syncPullAll();
    syncStatus = 'synced';
    authChecked = true;
    render();
  } catch (e) {
    console.error(e); syncStatus = 'error'; renderTopbar();
    authChecked = true;
    render();
    alert('Ошибка входа: ' + e.message);
  }
}

function clearLocalUserState() {

  // pushQueue тоже — иначе через 1 сек упадёт push несуществующих данных

/* ============================== SUPABASE: SYNC ============================== */
async function syncPullAll() {
  if (!supa || !currentAgentRow) return;
  // если есть незаконченный пуш — сначала дождёмся, иначе локальные изменения сотрутся pull-ом
  if (pushTimer) { clearTimeout(pushTimer); pushTimer = null; await flushPush(); }
  syncStatus = 'syncing'; renderTopbar();
  try {
    const [cl, pr, tk, dl, rf, tch, tbr] = await Promise.all([
      supa.from('clients').select('*'),
      supa.from('properties').select('*'),
      supa.from('tasks').select('*'),
      supa.from('deals').select('*'),
      supa.from('referrals').select('*'),
      supa.from('tg_chats').select('*'),
      supa.from('tg_broadcasts').select('*'),
    ]);
    // MERGE стратегия: серверные данные имеют приоритет, локальные «лишние» пушим в облако
    // ВАЖНО: отфильтровываем «надгробия» — записи которые пользователь удалил, но delete не дошёл
    function mergeLists(localList, serverList, mapper, pushType) {
      // отфильтровываем серверные записи которые помечены как удалённые локально
      const filteredServer = (serverList||[]).filter(r => !isTombstoned(pushType, r.id));
      // повторяем серверное удаление для tombstoned записей которые всё ещё на сервере
      (serverList||[]).filter(r => isTombstoned(pushType, r.id)).forEach(r => {
        syncDelete(pushType, r.id);
      });
      const serverIds = new Set(filteredServer.map(r => r.id));
      const localOnly = (localList||[])
        .filter(c => !serverIds.has(c.id))
        .filter(c => !isTombstoned(pushType, c.id)); // на случай если эта запись была удалена локально
      // отправляем локальные «лишние» в облако
      localOnly.forEach(obj => queuePush(pushType, obj));
      const merged = [...filteredServer.map(mapper), ...localOnly];
      // дедуп по id на всякий случай
      const seen = new Set();
      return merged.filter(r => r.id && !seen.has(r.id) && seen.add(r.id));
    }
    if (cl.data) state.clients = mergeLists(state.clients, cl.data, clientFromDB, 'client');
    if (pr.data) {
      // сохраняем локальные фото (они пока не в БД)
      const localPhotos = {};
      state.properties.forEach(p => { if (p.photos && p.photos.length) localPhotos[p.id] = p.photos; });
      state.properties = mergeLists(state.properties, pr.data, r => {
        const p = propFromDB(r);
        if (localPhotos[p.id]) p.photos = localPhotos[p.id];
        return p;
      }, 'property');
    }
    if (tk.data) state.tasks = mergeLists(state.tasks, tk.data, taskFromDB, 'task');
    if (dl.data) state.deals = mergeLists(state.deals, dl.data, dealFromDB, 'deal');
    // рефералы — только чтение, не критично если упадёт
    if (rf && !rf.error && rf.data) state.referrals = rf.data.map(referralFromDB);
    // tg_chats и tg_broadcasts
    if (tch && !tch.error && tch.data) state.tgChats = tch.data.map(tgChatFromDB);
    if (tbr && !tbr.error && tbr.data) state.broadcasts = tbr.data.map(broadcastFromDB);
    const { data: agents } = await supa.from('agents').select('id, name, phone, role, auth_user_id, avatar_url').order('created_at', { ascending: false });
    if (agents) {
      // дедуп по auth_user_id
      const byUser = new Map();
      const noUser = [];
      agents.forEach(a => {
        if (a.auth_user_id) {
          if (!byUser.has(a.auth_user_id)) byUser.set(a.auth_user_id, a);
        } else noUser.push(a);
      });
      state.agentsFull = [...byUser.values(), ...noUser];
      state.agents = state.agentsFull.map(a => a.name).filter(Boolean);
      state.agentPhones = {};
      state.agentsFull.forEach(a => { if (a.phone) state.agentPhones[a.name] = a.phone; });
      // обновляем свой аватар с сервера если он там есть
      if (currentAgentRow) {
        const me = state.agentsFull.find(a => a.id === currentAgentRow.id);
        if (me && me.avatar_url) state.user.avatar = me.avatar_url;
      }
    }
    saveState(state);
    syncStatus = 'synced';
  } catch (e) { console.error('pullAll:', e); syncStatus = 'error'; }
  renderTopbar();
}

function queuePush(type, obj) {
  if (!supa || !currentAgentRow) return;
  pushQueue.set(type + ':' + obj.id, { type, obj });
  syncStatus = 'syncing'; renderTopbar();
  clearTimeout(pushTimer);
  pushTimer = setTimeout(flushPush, 1000);
}
const failedPushTypes = new Set();
async function flushPush() {
  if (!supa || pushQueue.size === 0) return;
  const items = Array.from(pushQueue.values());
  pushQueue.clear();
  const mappers = { client: clientToDB, property: propToDB, task: taskToDB, deal: dealToDB, tgchat: tgChatToDB, broadcast: broadcastToDB };
  const tables = { client: 'clients', property: 'properties', task: 'tasks', deal: 'deals', tgchat: 'tg_chats', broadcast: 'tg_broadcasts' };
  let okCount = 0, errCount = 0, lastError = null, lastType = '';
  for (const { type, obj } of items) {
    // если эта таблица ранее ругалась 3+ раз — не дёргаем больше до перезагрузки страницы
    if (failedPushTypes.has(type)) continue;
    // НЕ пушим записи которые помечены как удалённые (tombstone) — иначе они «воскреснут»
    if (isTombstoned(type, obj.id)) continue;
    try {
      const { error } = await supa.from(tables[type]).upsert(mappers[type](obj));
      if (error) {
        console.error('push '+type, error, obj);
        errCount++; lastError = error; lastType = type;
        // RLS не лечится повтором — помечаем как «битую»
        if (String(error.message||'').includes('row-level security')) failedPushTypes.add(type);
      } else okCount++;
    } catch (e) { console.error(e); errCount++; lastError = e; lastType = type; }
  }
  // красный статус только если ВСЁ упало; иначе считаем что синхронизировано (частично)
  syncStatus = (okCount === 0 && errCount > 0) ? 'error' : 'synced';
  syncLastError = (errCount > 0 && lastError)
    ? '[' + lastType + '] ' + (lastError.message || JSON.stringify(lastError))
    : '';
  renderTopbar();
}
function showSyncError() {
  if (!syncLastError) { alert('Последняя синхронизация прошла без ошибок'); return; }
  alert('Ошибка синхронизации:\n\n' + syncLastError + '\n\nЧасто помогает:\n1. Запустить supabase-fix-rls.sql в SQL Editor\n2. Проверить вход в облако\n3. Нажать «Обновить» в Профиле');
}
// «Надгробия» удалённых записей — чтобы синхронизация не возвращала их с сервера, если delete не дошёл по RLS
// Структура: { client: { id1: timestamp, id2: timestamp }, property: {...}, ... }
let tombstones = JSON.parse(localStorage.getItem('tombstones') || '{}');
function saveTombstones() { localStorage.setItem('tombstones', JSON.stringify(tombstones)); }
function addTombstone(type, recordId) {
  if (!tombstones[type]) tombstones[type] = {};
  tombstones[type][recordId] = Date.now();
  saveTombstones();
}
function isTombstoned(type, recordId) {
  return !!(tombstones[type] && tombstones[type][recordId]);
}
function clearTombstoneIfStale(type, recordId) {
  // удалили локальное надгробие если успешно удалили с сервера (защита от вечного бана id)
  if (tombstones[type]) {
    delete tombstones[type][recordId];
    saveTombstones();
  }
}

async function syncDelete(type, recordId) {
  // СНАЧАЛА ставим tombstone — чтобы при любом исходе мы не подтянули запись обратно из БД
  addTombstone(type, recordId);
  // ВАЖНО: убираем из pushQueue — иначе отложенный upsert через 1с восстановит удалённое
  if (pushQueue && pushQueue.delete) {
    pushQueue.delete(type + ':' + recordId);
  }
  if (!supa || !currentAgentRow) return;
  const tables = { client: 'clients', property: 'properties', task: 'tasks', deal: 'deals', tgchat: 'tg_chats', broadcast: 'tg_broadcasts' };
  if (!tables[type]) return;
  syncStatus = 'syncing'; renderTopbar();
  try {
    const { error, data } = await supa.from(tables[type]).delete().eq('id', recordId).select();
    if (error) {
      console.warn('syncDelete error', type, recordId, error);
      syncStatus = 'error';
      // оставляем tombstone — повторим удаление при следующем syncPullAll
    } else if (!data || data.length === 0) {
      // RLS-фильтр пропустил delete без ошибки, но 0 строк удалено — нет прав
      console.warn('syncDelete blocked by RLS', type, recordId);
      syncStatus = 'synced'; // запись отфильтрована, скрываем локально через tombstone
    } else {
      // успех
      syncStatus = 'synced';
    }
  } catch(e) {
    console.warn('syncDelete exception', e); syncStatus = 'error';
  }
  renderTopbar();
}

// При логауте чистим надгробия чтобы они не блокировали данные нового пользователя
function clearTombstones() { tombstones = {}; saveTombstones(); }

/* ============================== SUPABASE: UI ============================== */
function openCloudLogin() {
  openModal(`
    <h2>Облако: вход</h2>
    <p class="meta" style="margin-bottom: 14px;">Войдите чтобы данные синхронизировались между всеми устройствами.</p>
    <div class="tabs" style="margin-bottom: 14px;">
      <button class="tab active" onclick="document.getElementById('cl-mode').value='in'; document.getElementById('cl-name-field').style.display='none'; document.getElementById('cl-consent-field').style.display='none'; document.getElementById('cl-submit').textContent='Войти';">Войти</button>
      <button class="tab" onclick="document.getElementById('cl-mode').value='up'; document.getElementById('cl-name-field').style.display='block'; document.getElementById('cl-consent-field').style.display='block'; document.getElementById('cl-submit').textContent='Зарегистрироваться';">Регистрация</button>
    </div>
    <input id="cl-mode" type="hidden" value="in">
    <div class="field"><label>Email</label><input id="cl-email" type="email" autocomplete="email" placeholder="you@example.com"></div>
    <div class="field"><label>Пароль</label><input id="cl-password" type="password" autocomplete="current-password" placeholder="минимум 6 знаков"></div>
    <div class="field" id="cl-name-field" style="display:none;"><label>Имя</label><input id="cl-name" value="${state.user.name||''}"></div>
    <div id="cl-consent-field" style="display:none; padding: 12px; background: var(--surface-2); border-radius: 8px; margin-bottom: 14px;">
      <label style="display:flex; align-items:flex-start; gap:8px; cursor:pointer; font-size: 12px; line-height: 1.45;">
        <input id="cl-consent" type="checkbox" style="margin-top: 3px; flex-shrink: 0;">
        <span style="color: var(--text);">Я согласен на обработку моих персональных данных в соответствии с
          <a href="privacy.html" target="_blank" style="color: var(--accent);">Политикой конфиденциальности</a>
          (152-ФЗ). Подтверждаю что мне исполнилось 18 лет.
        </span>
      </label>
    </div>
    <button id="cl-submit" class="btn" onclick="submitCloudAuth()">Войти</button>
  `);
}
async function submitCloudAuth() {
  const mode = document.getElementById('cl-mode').value;
  const email = document.getElementById('cl-email').value.trim();
  const password = document.getElementById('cl-password').value;
  if (!email || password.length < 6) { alert('Заполните email и пароль'); return; }
  if (mode === 'in') {
    const ok = await cloudSignIn(email, password);
    if (ok) closeModal();
  } else {
    const consent = document.getElementById('cl-consent')?.checked;
    if (!consent) { alert('Для регистрации требуется согласие на обработку персональных данных'); return; }
    const name = document.getElementById('cl-name').value.trim() || email.split('@')[0];
    // Роль при самостоятельной регистрации всегда «Агент» — повышает Директор отдельно
    const ok = await cloudSignUp(email, password, name, 'Агент');
    if (ok) closeModal();
  }
}
async function pushAllLocal() {
  if (!supa || !currentAgentRow) { alert('Сначала войдите в облако'); return; }
  if (!confirm('Загрузить все локальные данные в облако? Если в облаке уже есть данные с теми же ID — они обновятся.')) return;
  syncStatus = 'syncing'; renderTopbar();
  try {
    if (state.clients.length) await supa.from('clients').upsert(state.clients.map(clientToDB));
    if (state.properties.length) await supa.from('properties').upsert(state.properties.map(propToDB));
    if (state.tasks.length) await supa.from('tasks').upsert(state.tasks.map(taskToDB));
    if (state.deals.length) await supa.from('deals').upsert(state.deals.map(dealToDB));
    if (state.partnerDeals.length) await supa.from('partner_deals').upsert(state.partnerDeals.map(partnerDealToDB));
    if (state.referrals.length) await supa.from('referrals').upsert(state.referrals.map(referralToDB));
    syncStatus = 'synced';
    alert('Локальные данные загружены в облако');
  } catch (e) { console.error(e); syncStatus = 'error'; alert('Ошибка: ' + e.message); }
  renderTopbar();
}

/* ============================== CAPACITOR (нативная обёртка) ============================== */
// Эти проверки работают только когда приложение запущено как нативное (Android/iOS)
// В обычном браузере window.Capacitor отсутствует — всё работает по-старому
const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
if (isNative) {
  // Системные кнопки назад (Android) — закрыть модалку или вернуться, не закрывать приложение
  document.addEventListener('backbutton', e => {
    e.preventDefault();
    const modal = document.getElementById('modalBg');
    if (modal && modal.classList.contains('open')) { closeModal(); return; }
    if (route !== 'home') { go('home'); return; }
    // если уже на главной — позволим закрыть приложение
    if (window.Capacitor.Plugins?.App?.exitApp) window.Capacitor.Plugins.App.exitApp();
  }, false);
}

/* ============================== AUTO-SYNC ============================== */
let lastSyncAt = 0;
async function maybeAutoSync() {
  if (!supa || !currentAgentRow) return;
  // не чаще раза в 5 секунд
  if (Date.now() - lastSyncAt < 5000) return;
  lastSyncAt = Date.now();
  await syncPullAll();
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') maybeAutoSync();
});
window.addEventListener('focus', maybeAutoSync);
// дополнительно — раз в минуту в фоне если страница активна
setInterval(() => { if (document.visibilityState === 'visible') maybeAutoSync(); }, 60000);

/* ============================== HISTORY / BACK ============================== */
window.addEventListener('popstate', e => {
  // Если открыта модалка — закроем её, не уходя со страницы
  const modal = document.getElementById('modalBg');
  if (modal && modal.classList.contains('open')) {
    closeModal();
    history.pushState({ route, crmTab }, '', location.hash || '#' + route);
    return;
  }
  // Восстановить роут из state
  const st = e.state;
  if (st && st.route) {
    route = st.route;
    if (st.crmTab) crmTab = st.crmTab;
    render();
  }
});
// заменяем "уход" из приложения на возврат на главную
history.replaceState({ route, crmTab }, '', location.hash || '#' + route);

/* ============================== REMINDERS ============================== */
function initReminders() {
  // запросить разрешение на пуши при первом клике пользователя
  if ('Notification' in window && Notification.permission === 'default') {
    document.addEventListener('click', () => {
      if (Notification.permission === 'default') {
        Notification.requestPermission().catch(()=>{});
      }
    }, { once: true });
  }
  // проверять очередь раз в минуту
  setInterval(checkReminders, 60000);
  // первая проверка через 5 секунд после старта
  setTimeout(checkReminders, 5000);
}

function checkReminders() {
  if (!state.notifiedIds) state.notifiedIds = [];
  // обнуляем список оповещённых в начале каждого дня
  if (!state.notifiedDate || state.notifiedDate !== new Date().toDateString()) {
    state.notifiedIds = [];
    state.notifiedDate = new Date().toDateString();
  }
  const now = Date.now();
  const horizonMin = 30; // напоминаем за 30 минут до события
  const due = [];

  // задачи
  state.tasks.forEach(t => {
    if (t.done || !t.when) return;
    const diff = (new Date(t.when).getTime() - now) / 60000;
    if (diff >= -1 && diff <= horizonMin && !state.notifiedIds.includes('task_'+t.id)) {
      due.push({ id: 'task_'+t.id, kind: 'Задача', title: t.title, when: t.when, openFn: `openTask('${t.id}')` });
    }
  });

  // клиенты — nextContact
  visibleClients().forEach(c => {
    if (!c.nextContact) return;
    const diff = (new Date(c.nextContact).getTime() - now) / 60000;
    if (diff >= -1 && diff <= horizonMin && !state.notifiedIds.includes('client_'+c.id)) {
      due.push({
        id: 'client_'+c.id, kind: 'Клиент',
        title: (c.nextAction || 'Контакт') + ' · ' + c.name,
        when: c.nextContact, openFn: `openClient('${c.id}')`,
      });
    }
  });

  // объекты — nextEvent
  state.properties.forEach(p => {
    if (!p.nextEvent) return;
    const diff = (new Date(p.nextEvent).getTime() - now) / 60000;
    if (diff >= -1 && diff <= horizonMin && !state.notifiedIds.includes('prop_'+p.id)) {
      due.push({
        id: 'prop_'+p.id, kind: 'Объект',
        title: (p.nextEventTitle || 'Событие') + ' · ' + (p.complex || p.title),
        when: p.nextEvent, openFn: `openProperty('${p.id}')`,
      });
    }
  });

  due.forEach(d => {
    fireReminder(d);
    state.notifiedIds.push(d.id);
  });
  if (due.length) saveState(state);
}

function fireReminder(d) {
  const time = fmtTime(d.when);
  // браузерный пуш если разрешено
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const n = new Notification('CRM Агента · ' + time, {
        body: d.title, icon: 'icons/icon-192.png', tag: d.id, badge: 'icons/icon-192.png',
      });
      n.onclick = () => { window.focus(); try { eval(d.openFn); } catch(e){} n.close(); };
    } catch(e) { console.warn(e); }
  }
  // плюс показываем внутренний баннер в любом случае
  showReminderBanner(d, time);
}

function showReminderBanner(d, time) {
  const banner = document.createElement('div');
  banner.className = 'reminder-banner';
  banner.innerHTML = `
    <strong>⏰ ${time} · ${d.kind}</strong>
    <div>${d.title}</div>
    <button class="rb-close" aria-label="Закрыть">×</button>
  `;
  banner.onclick = e => {
    if (e.target.classList.contains('rb-close')) { banner.remove(); return; }
    banner.remove();
    try { eval(d.openFn); } catch(err) {}
  };
  document.body.appendChild(banner);
  // автоматически убрать через 45 секунд
  setTimeout(() => banner.remove(), 45000);
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Если есть новая версия — обновляемся
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('Доступна новая версия приложения');
          }
        });
      });
    }).catch(err => console.warn('SW register failed:', err));
  });
}
